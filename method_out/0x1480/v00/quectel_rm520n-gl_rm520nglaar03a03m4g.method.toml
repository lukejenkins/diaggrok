version = 0
cond = "sky-fix"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "svs[].sv_id"
quantity = "glonass_sv_slot"
status = "verified"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "nmea", value = "$GLGSV/$GNGSV satellite-number field (1st of each 4-tuple)" },
]

[[field_map]]
parser_field = "svs[].cno_db"
quantity = "gnss_carrier_to_noise_dbhz"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "nmea", value = "$GLGSV SNR field (4th of each slot 4-tuple)" },
]

[[field_map]]
parser_field = "svs[].az_deg"
quantity = "gnss_sv_azimuth_deg"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "nmea", value = "$GLGSV azimuth field (3rd of each slot 4-tuple)" },
]

[[field_map]]
parser_field = "svs[].el_deg"
quantity = "gnss_sv_elevation_deg"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "nmea", value = "$GLGSV elevation field (2nd of each slot 4-tuple)" },
]

[[field_map]]
parser_field = "svs[].freq_index"
quantity = "glonass_fdma_channel"

[[field_map.sources]]
kind = "other"
value = "GLONASS slot→FDMA-channel almanac table (no NMEA/AT field exposes the channel directly)"

version = 0
cond = "sky-fix"
modem_make = "SIMCom"
modem_model = "SIM8202G-M2"
modem_firmware = "LE13B04SIM8202M44A-M2"

[[field_map]]
parser_field = "svs[].sv_id"
quantity = "glonass_sv_slot"

[[field_map.sources]]
kind = "other"
value = "F3 mc_peak.c GLONASS 'Gnss:1 ... SV:<n>' (SimCom build qdb) @sim8202g-m2"

[[field_map.sources]]
kind = "nmea"
value = "$GLGSV/$GNGSV satellite-number field (1st of each 4-tuple; 65-96)"

[[field_map]]
parser_field = "svs[].cno_db"
quantity = "gnss_carrier_to_noise_dbhz"

[[field_map.sources]]
kind = "other"
value = "F3 mc_peak.c GLONASS 'C/No:<n>' (SimCom build qdb) @sim8202g-m2"

[[field_map.sources]]
kind = "nmea"
value = "$GLGSV SNR field (4th of each 4-tuple, integer dB-Hz, null when untracked)"

[[field_map]]
parser_field = "svs[].az_deg"
quantity = "gnss_sv_azimuth_deg"
sources = [
    { kind = "nmea", value = "$GLGSV azimuth field (3rd of each slot 4-tuple, deg)" },
]

[[field_map]]
parser_field = "svs[].el_deg"
quantity = "gnss_sv_elevation_deg"
sources = [
    { kind = "nmea", value = "$GLGSV elevation field (2nd of each slot 4-tuple, deg)" },
]

[[field_map]]
parser_field = "svs[].freq_index"
quantity = "glonass_fdma_channel"

[[field_map.sources]]
kind = "other"
value = "GLONASS slot->FDMA-channel almanac (or F3 mc_afc GLONASS print if present) @sim8202g-m2"

version = 4
cond = "any-drive"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "v4_cells.meas_high_byte"
quantity = "lte_neighbor_interfreq_measurement_candidate"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "at", value = "AT+QSINR" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo" },
    { kind = "mbim", value = "MBIM_CID_BASE_STATIONS_INFO" },
]

[[field_map]]
parser_field = "num_cells"
quantity = "lte_neighbor_interfreq_cell_count_candidate"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (inter-freq neighbor list length)" },
]

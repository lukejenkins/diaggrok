version = 1
cond = "sky-fix"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "constellation"
quantity = "gnss_constellation_id"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "nmea", value = "$GxGSV talker ID (GP/GL/GA/GB/GS)" },
]

[[field_map]]
parser_field = "metric_a"
quantity = "gnss_rf_chain_cn0_or_signal_candidate"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "nmea", value = "$GxGSV per-SV C/N0 dB-Hz" },
]

[[field_map]]
parser_field = "metric_b"
quantity = "gnss_rf_chain_metric_b_candidate"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GSA\"" },
]

[[field_map]]
parser_field = "metric_c"
quantity = "gnss_rf_chain_metric_c_candidate"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
]

[[field_map]]
parser_field = "metric_d"
quantity = "gnss_rf_chain_metric_d_candidate"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
]

[[field_map]]
parser_field = "active"
quantity = "gnss_constellation_active_flag"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
]

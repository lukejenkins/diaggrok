version = 1
cond = "sky-fix"
modem_make = "Foxconn"
modem_model = "T99W175"
modem_firmware = "T99W175.F0.1.0.0.9.VZ.009"

[[field_map]]
parser_field = "constellation"
quantity = "gnss_constellation_id"
sources = [
    { kind = "nmea", value = "$GxGSV talker ID (GP/GL/GA/GB/GS) — T99W175 native NMEA" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "metric_a"
quantity = "gnss_rf_chain_cn0_or_signal_candidate"
status = "partial"
sources = [
    { kind = "nmea", value = "$GxGSV per-SV C/N0 dB-Hz, aggregated per constellation" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "metric_b"
quantity = "gnss_rf_chain_metric_b_candidate"
sources = [
    { kind = "nmea", value = "$GxGSV aggregate C/N0 vs metric_b trend" },
    { kind = "nmea", value = "$GxGSA fix type / DOP as a quality cross-reference" },
]

[[field_map]]
parser_field = "metric_c"
quantity = "gnss_rf_chain_metric_c_candidate"
sources = [
    { kind = "nmea", value = "$GxGSV aggregate C/N0 vs metric_c trend" },
]

[[field_map]]
parser_field = "metric_d"
quantity = "gnss_rf_chain_metric_d_candidate"
sources = [
    { kind = "nmea", value = "aggregate $GxGSV C/N0 vs metric_d trend" },
]

[[field_map]]
parser_field = "active"
quantity = "gnss_constellation_active_flag"
sources = [
    { kind = "nmea", value = "constellation has ≥1 tracked SV in $GxGSV ⇒ active expected true" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

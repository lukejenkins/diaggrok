version = 1
cond = "sky-fix"
modem_make = "Fibocom"
modem_model = "FM101-GL"
modem_firmware = "19500.0000.00.01.01.52"

[[field_map]]
parser_field = "constellation"
quantity = "gnss_constellation_id"
sources = [
    { kind = "nmea", value = "FM101-GL GNSS NMEA-port $GxGSV talker ID (GP/GL/GA/GB/GS)" },
]

[[field_map]]
parser_field = "metric_a"
quantity = "gnss_rf_chain_cn0_or_signal_candidate"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GxGSV per-SV C/N0 (field 7 of each SV block), aggregated per constellation"

[[field_map]]
parser_field = "metric_b"
quantity = "gnss_rf_chain_metric_b_candidate"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GxGSV aggregate C/N0 (b vs c/b*b trend)"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GxGSA fix type / DOP (quality cross-reference)"

[[field_map]]
parser_field = "metric_c"
quantity = "gnss_rf_chain_metric_c_candidate"
sources = [
    { kind = "nmea", value = "FM101-GL GNSS NMEA-port $GxGSV aggregate C/N0 vs metric_c trend" },
]

[[field_map]]
parser_field = "metric_d"
quantity = "gnss_rf_chain_metric_d_candidate"
sources = [
    { kind = "nmea", value = "FM101-GL GNSS NMEA-port $GxGSV aggregate C/N0 vs metric_d trend" },
]

[[field_map]]
parser_field = "active"
quantity = "gnss_constellation_active_flag"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GxGSV: constellation has >=1 tracked SV => active expected true"

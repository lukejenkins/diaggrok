version = 1
cond = "sky-fix"
modem_make = "Sierra"
modem_model = "EM9291"
modem_firmware = "SWIX65C_02.17.08.00"

[[field_map]]
parser_field = "constellation"
quantity = "gnss_constellation_id"
sources = [
    { kind = "nmea", value = "$GxGSV talker ID (GP/GL/GA/GB/GS)" },
]

[[field_map]]
parser_field = "metric_a"
quantity = "gnss_rf_chain_cn0_or_signal_candidate"

[[field_map.sources]]
kind = "at"
value = "AT!GPSSATINFO?"

[[field_map.sources]]
kind = "nmea"
value = "$GxGSV per-SV C/N0 (field 7 of each SV block), aggregated per constellation"

[[field_map.sources]]
kind = "f3"
value = "navrx_sdr855.cpp:2439"

[[field_map]]
parser_field = "metric_b"
quantity = "gnss_rf_chain_metric_b_candidate"
sources = [
    { kind = "nmea", value = "compare b and c/b·b against aggregate $GxGSV C/N0" },
    { kind = "f3", value = "navrx_sdr855.cpp:2614" },
]

[[field_map]]
parser_field = "metric_c"
quantity = "gnss_rf_chain_metric_c_candidate"
sources = [
    { kind = "nmea", value = "aggregate $GxGSV C/N0 vs metric_c trend" },
]

[[field_map]]
parser_field = "metric_d"
quantity = "gnss_rf_chain_metric_d_candidate"
sources = [
    { kind = "nmea", value = "aggregate $GxGSV C/N0 vs metric_d trend" },
]

[[field_map]]
parser_field = "active"
quantity = "gnss_constellation_active_flag"
sources = [
    { kind = "nmea", value = "constellation has ≥1 tracked SV in $GxGSV ⇒ active expected true" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

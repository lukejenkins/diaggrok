version = 1
cond = "connected"
modem_make = "CasaSystems"
modem_model = "CFW-3212"
modem_firmware = "RG520NNADAR03A03M4G"

[[field_map]]
parser_field = "entries.earfcn"
quantity = "lte_neighbor_earfcn"
status = "verified"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "other", value = "DIAG 0xB193 / 0xB0C0 earfcn" },
]

[[field_map]]
parser_field = "entries.pci"
quantity = "lte_neighbor_physical_cell_id"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
]

[[field_map]]
parser_field = "entries.rsrp"
quantity = "lte_neighbor_rsrp_dbm"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
]

[[field_map]]
parser_field = "num_cells"
quantity = "lte_neighbor_cell_count"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
]

version = 1
cond = "idle"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G_A0.303.A0.303"

[[field_map]]
parser_field = "entries.pci"
quantity = "lte_neighbor_physical_cell_id"
status = "verified"

[[field_map.sources]]
kind = "at"
value = "AT+QENG=\"neighbourcell\""

[[field_map.sources]]
kind = "qmi"
value = "QMI_NAS GetCellLocationInfo (LTE intra/inter-freq neighbor list → per-cell PCI)"

[[field_map.sources]]
kind = "mbim"
value = "MBIM_CID_BASE_STATIONS_INFO (LTE neighbor list)"

[[field_map]]
parser_field = "entries.earfcn"
quantity = "lte_neighbor_earfcn"
status = "verified"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (per-neighbor EARFCN)" },
]

[[field_map]]
parser_field = "entries.rsrp"
quantity = "lte_neighbor_rsrp_dbm"
status = "refuted"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "qmi", value = "QMI_NAS GetSignalInfo / GetCellLocationInfo (neighbor RSRP)" },
    { kind = "mbim", value = "MBIM_CID_BASE_STATIONS_INFO (neighbor RSRP)" },
]

[[field_map]]
parser_field = "entries.rsrq_rx0"
quantity = "lte_neighbor_rsrq_db_rx0"
status = "refuted"

[[field_map.sources]]
kind = "at"
value = "AT+QENG=\"neighbourcell\""

[[field_map.sources]]
kind = "qmi"
value = "QMI_NAS GetCellLocationInfo (per-cell RSRQ; per-Rx split not guaranteed)"

[[field_map]]
parser_field = "entries.rsrq_rx1"
quantity = "lte_neighbor_rsrq_db_rx1"
status = "refuted"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (per-cell RSRQ)" },
]

[[field_map]]
parser_field = "num_cells"
quantity = "lte_neighbor_cell_count"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (length of the neighbor cell list)" },
]

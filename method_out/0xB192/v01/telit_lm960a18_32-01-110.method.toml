version = 1
cond = "idle"
modem_make = "Telit"
modem_model = "LM960A18"
modem_firmware = "32.01.110"

[[field_map]]
parser_field = "entries.pci"
quantity = "lte_neighbor_physical_cell_id"
sources = [
    { kind = "at", value = "AT#MONI" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (LTE neighbor list → per-cell PCI)" },
    { kind = "mbim", value = "MBIM_CID_BASE_STATIONS_INFO (LTE neighbor list)" },
]

[[field_map]]
parser_field = "entries.earfcn"
quantity = "lte_neighbor_earfcn"
sources = [
    { kind = "at", value = "AT#MONI" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (per-neighbor EARFCN)" },
]

[[field_map]]
parser_field = "entries.rsrp"
quantity = "lte_neighbor_rsrp_dbm"
sources = [
    { kind = "at", value = "AT#MONI" },
    { kind = "at", value = "AT#RFSTS" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (neighbor RSRP)" },
]

[[field_map]]
parser_field = "entries.rsrq_rx0"
quantity = "lte_neighbor_rsrq_db_rx0"
sources = [
    { kind = "at", value = "AT#MONI" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (per-cell RSRQ; per-Rx not guaranteed)" },
]

[[field_map]]
parser_field = "entries.rsrq_rx1"
quantity = "lte_neighbor_rsrq_db_rx1"
sources = [
    { kind = "at", value = "AT#MONI" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (per-cell RSRQ)" },
]

[[field_map]]
parser_field = "num_cells"
quantity = "lte_neighbor_cell_count"
sources = [
    { kind = "at", value = "AT#MONI" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo (length of the neighbor list)" },
]

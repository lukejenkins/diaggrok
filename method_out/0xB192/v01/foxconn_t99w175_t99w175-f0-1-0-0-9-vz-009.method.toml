version = 1
cond = "idle"
modem_make = "Foxconn"
modem_model = "T99W175"
modem_firmware = "T99W175.F0.1.0.0.9.VZ.009"

[[field_map]]
parser_field = "entries.pci"
quantity = "lte_neighbor_physical_cell_id"
sources = [
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo" },
    { kind = "mbim", value = "MBIM_CID_BASE_STATIONS_INFO" },
    { kind = "other", value = "DIAG 0xB193 serving PCI @t99w175" },
]

[[field_map]]
parser_field = "entries.earfcn"
quantity = "lte_neighbor_earfcn"
sources = [
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo" },
    { kind = "other", value = "DIAG 0xB0C0 / 0xB193 earfcn @t99w175" },
]

[[field_map]]
parser_field = "entries.rsrp"
quantity = "lte_neighbor_rsrp_dbm"
sources = [
    { kind = "qmi", value = "QMI_NAS GetSignalInfo" },
    { kind = "at", value = "AT+CESQ" },
    { kind = "f3", value = "lte_LL1_meas_ncell.c — NB_MEAS max_SE/max_SNE" },
]

[[field_map]]
parser_field = "entries.rsrq_rx0"
quantity = "lte_neighbor_rsrq_db_rx0"
sources = [
    { kind = "qmi", value = "QMI_NAS GetSignalInfo" },
    { kind = "at", value = "AT+CESQ" },
]

[[field_map]]
parser_field = "entries.rsrq_rx1"
quantity = "lte_neighbor_rsrq_db_rx1"
sources = [
    { kind = "qmi", value = "QMI_NAS GetSignalInfo" },
]

[[field_map]]
parser_field = "num_cells"
quantity = "lte_neighbor_cell_count"
sources = [
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo" },
    { kind = "other", value = "co-captured DIAG 0x187B / 0x4179 neighbour count @t99w175" },
]

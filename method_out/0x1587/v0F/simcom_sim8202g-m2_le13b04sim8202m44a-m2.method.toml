version = 15
cond = "sky-fix"
modem_make = "SIMCom"
modem_model = "SIM8202G-M2"
modem_firmware = "LE13B04SIM8202M44A-M2"

[[field_map]]
parser_field = "state_5"
quantity = "gnss_tracking_state_candidate"
sources = [
    { kind = "at", value = "AT+CGNSSINFO" },
    { kind = "at", value = "AT+CGPS?" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "body_size"
quantity = "gnss_tracked_sv_count_candidate"
sources = [
    { kind = "at", value = "AT+CGNSSINFO" },
    { kind = "nmea", value = "$GxGSV satellites-in-view (per-constellation GSV sentences)" },
]

[[field_map]]
parser_field = "byte_3"
quantity = "gnss_measurement_epoch_counter_candidate"
sources = [
    { kind = "at", value = "AT+CGNSSINFO" },
]

[[field_map]]
parser_field = "flag_4"
quantity = "gnss_tracking_substate_flag_candidate"
sources = [
    { kind = "at", value = "AT+CGNSSINFO" },
    { kind = "at", value = "AT+CGPS?" },
]

version = 1
cond = "sky-fix"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "slots.prn"
quantity = "gnss_tracker_channel_prn"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GSA\"" },
]

[[field_map]]
parser_field = "slots.prev_az_deg"
quantity = "gnss_prev_slot_prn_azimuth_deg"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "other", value = "DIAG 0x1477 az/el (same-capture)" },
]

[[field_map]]
parser_field = "slots.prev_el_deg"
quantity = "gnss_prev_slot_prn_elevation_deg"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
]

[[field_map]]
parser_field = "slots.state_value"
quantity = "gnss_tracker_channel_state_cache"
sources = [
    { kind = "other", value = "cross-boot per-PRN state_hi16 reproducibility" },
]

[[field_map]]
parser_field = "version"
quantity = "log_code_identity_and_emission_0x1494"
status = "partial"

[[field_map.sources]]
kind = "f3"
value = "gnss_diag_buf.c:1141/:1200 gnss_dm_log_commit '... log_code 0x%x ...' / 'log 0x%x to diag buffer!!'"

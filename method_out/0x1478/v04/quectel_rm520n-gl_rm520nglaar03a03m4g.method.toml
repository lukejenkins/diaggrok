version = 4
cond = "sky-fix"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "gps_week"
quantity = "gps_week_number"
status = "verified"
sources = [
    { kind = "at", value = "AT+QGPSLOC=2" },
    { kind = "nmea", value = "$GPRMC date field → GPS week conversion" },
]

[[field_map]]
parser_field = "gps_ms"
quantity = "gps_time_of_week_ms"
status = "verified"
sources = [
    { kind = "at", value = "AT+QGPSLOC=2" },
    { kind = "nmea", value = "$GPGGA UTC time → GPS ToW" },
]

[[field_map]]
parser_field = "f_count"
quantity = "modem_frame_counter"
status = "partial"
sources = [
    { kind = "trigger", value = "GNSS engine running (AT+QGPS=1)" },
]

[[field_map]]
parser_field = "flags"
quantity = "gnss_clock_status_flags"
status = "partial"
sources = [
    { kind = "at", value = "AT+QGPSLOC=2" },
]

version = 1
cond = "sky-fix"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "num_active_gps_slots"
quantity = "gnss_gps_actively_tracked_sv_count"
sources = [
    { kind = "nmea", value = "GSV (GPGSV/GNGSV) — count GPS SVs with a populated SNR field" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GSA\"" },
]

[[field_map]]
parser_field = "num_active_glonass_slots"
quantity = "gnss_glonass_actively_tracked_sv_count"
sources = [
    { kind = "nmea", value = "GLGSV — count GLONASS SVs with a populated SNR field" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
]

[[field_map]]
parser_field = "gps_slots.prn_like"
quantity = "gnss_gps_sv_prn_a08_firmware_only"
sources = [
    { kind = "nmea", value = "GSV (GPGSV) — GPS PRN list (join key for the a08 validation)" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GSV\"" },
]

[[field_map]]
parser_field = "gps_slots.slot_state"
quantity = "gnss_gps_channel_tracking_state_candidate"

[[field_map.sources]]
kind = "nmea"
value = "GSV per-SV SNR (dB-Hz) — ordinal cross-check of state vs signal strength"

[[field_map.sources]]
kind = "at"
value = "AT+QGPSGNMEA=\"GSV\""

[[field_map]]
parser_field = "block_count"
quantity = "gnss_measured_signal_count_candidate"
sources = [
    { kind = "nmea", value = "$GQGSV / $GPGSV QZSS+SBAS satellites-in-view" },
    { kind = "at", value = "AT!GPSSATINFO?" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "blocks"
quantity = "gnss_uncomputed_angle_sentinel_check"
sources = [
    { kind = "trigger", value = "structural invariant check (f32 == -pi/2)" },
]

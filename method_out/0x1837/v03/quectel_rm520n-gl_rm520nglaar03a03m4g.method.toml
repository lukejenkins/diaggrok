version = 3
cond = "sky-fix"
modem_make = "Quectel"
modem_model = "RM520N-GL"
modem_firmware = "RM520NGLAAR03A03M4G"

[[field_map]]
parser_field = "latitude_deg"
quantity = "gnss_latitude_deg"
status = "verified"
sources = [
    { kind = "at", value = "AT+QGPSLOC=2" },
    { kind = "at", value = "AT+QGPSGNMEA=\"RMC\"" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GGA\"" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
    { kind = "nmea", value = "$GxGGA field 2/3 / $GxRMC field 3/4" },
]

[[field_map]]
parser_field = "longitude_deg"
quantity = "gnss_longitude_deg"
status = "verified"
sources = [
    { kind = "at", value = "AT+QGPSLOC=2" },
    { kind = "at", value = "AT+QGPSGNMEA=\"RMC\"" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GGA\"" },
    { kind = "nmea", value = "$GxGGA field 4/5 / $GxRMC field 5/6" },
]

[[field_map]]
parser_field = "altitude_m"
quantity = "gnss_altitude_m"
status = "verified"
sources = [
    { kind = "at", value = "AT+QGPSLOC=2" },
    { kind = "at", value = "AT+QGPSGNMEA=\"GGA\"" },
    { kind = "nmea", value = "$GxGGA field 9 (MSL) + field 11 (geoid separation)" },
]

[[field_map]]
parser_field = "position_uncertainty_m"
quantity = "gnss_horizontal_position_uncertainty_m"
status = "partial"
sources = [
    { kind = "nmea", value = "$GxGGA field 8 (HDOP) — unitless proxy, not metres" },
    { kind = "other", value = "QMI_LOC position-report event HEPE (not in poller set yet)" },
]

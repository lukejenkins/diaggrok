version = 3
cond = "sky-fix"
modem_make = "Wistron"
modem_model = "LV55"
modem_firmware = "3.33.101.0"

[[field_map]]
parser_field = "slots[].rf_metric_1"
quantity = "glonass_rf_bandpass_metric_candidate"
sources = [
    { kind = "nmea", value = "$GLGSV per-SV C/N0 (GLONASS satellites in view)" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "slots[].rf_metric_2"
quantity = "glonass_rf_bandpass_metric_2_candidate"
sources = [
    { kind = "nmea", value = "$GLGSV C/N0 as the shared reference" },
]

[[field_map]]
parser_field = "slots[].rf_metric_3"
quantity = "glonass_rf_bandpass_metric_3_candidate"
sources = [
    { kind = "nmea", value = "$GLGSV C/N0 (shared reference for the metric triplet)" },
]

[[field_map]]
parser_field = "slots[].state_flag"
quantity = "glonass_fcn_tracking_state_candidate"
sources = [
    { kind = "nmea", value = "$GLGSV row presence/C/N0 over time" },
]

[[field_map]]
parser_field = "slots[].metric_a"
quantity = "glonass_fcn_channel_id_candidate"
sources = [
    { kind = "nmea", value = "$GLGSV satellite IDs (GLONASS slot numbers 65-96)" },
]

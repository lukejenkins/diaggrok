version = 0
cond = "sky-fix"
modem_make = "Fibocom"
modem_model = "FM101-GL"
modem_firmware = "19500.0000.00.01.01.52"

[[field_map]]
parser_field = "svs[].sv_id"
quantity = "gps_sv_prn"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GPGSV satellite-number field (1st of each 4-tuple)"

[[field_map.sources]]
kind = "at"
value = "AT+FGPS_INFO"

[[field_map]]
parser_field = "svs[].cno_db"
quantity = "gnss_carrier_to_noise_dbhz"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GPGSV SNR field (4th of each 4-tuple, dB-Hz)"

[[field_map.sources]]
kind = "at"
value = "AT+FGPS_INFO"

[[field_map]]
parser_field = "svs[].az_deg"
quantity = "gnss_sv_azimuth_deg"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GPGSV azimuth field (3rd of each 4-tuple, deg)"

[[field_map]]
parser_field = "svs[].el_deg"
quantity = "gnss_sv_elevation_deg"

[[field_map.sources]]
kind = "nmea"
value = "FM101-GL GNSS NMEA-port $GPGSV elevation field (2nd of each 4-tuple, deg)"

[[field_map]]
parser_field = "gps_week"
quantity = "gps_week_number"
sources = [
    { kind = "other", value = "GPS week derived from fix UTC date (sanity bound)" },
]

[[field_map]]
parser_field = "gps_milliseconds"
quantity = "gps_time_of_week_ms"
sources = [
    { kind = "other", value = "GPS time-of-week derived from fix UTC (sanity bound)" },
]

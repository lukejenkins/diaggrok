version = 0
cond = "sky-fix"
modem_make = "Foxconn"
modem_model = "T99W175"
modem_firmware = "T99W175.F0.1.0.0.9.VZ.009"

[[field_map]]
parser_field = "svs[].sv_id"
quantity = "gps_sv_prn"

[[field_map.sources]]
kind = "nmea"
value = "$GPGSV satellite-PRN field (1st of each 4-tuple) — modem's own gsi.gps NMEA and/or LG290P reference"

[[field_map]]
parser_field = "svs[].cno_db"
quantity = "gnss_carrier_to_noise_dbhz"

[[field_map.sources]]
kind = "nmea"
value = "$GPGSV SNR field (4th of each PRN 4-tuple, dB-Hz, null when not tracked)"

[[field_map]]
parser_field = "svs[].az_deg"
quantity = "gnss_sv_azimuth_deg"
sources = [
    { kind = "nmea", value = "$GPGSV azimuth field (3rd of each PRN 4-tuple, deg)" },
]

[[field_map]]
parser_field = "svs[].el_deg"
quantity = "gnss_sv_elevation_deg"
sources = [
    { kind = "nmea", value = "$GPGSV elevation field (2nd of each PRN 4-tuple, deg)" },
]

[[field_map]]
parser_field = "gps_week"
quantity = "gps_week_number"
sources = [
    { kind = "nmea", value = "$GxRMC field 9 (date ddmmyy) -> GPS-week conversion" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "gps_milliseconds"
quantity = "gps_time_of_week_ms"
sources = [
    { kind = "nmea", value = "$GxGGA field 1 (UTC hhmmss.sss) — GPS->UTC reconciliation" },
]

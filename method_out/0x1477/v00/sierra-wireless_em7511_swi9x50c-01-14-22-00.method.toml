version = 0
cond = "sky-fix"
modem_make = "Sierra"
modem_model = "EM7511"
modem_firmware = "SWI9X50C_01.14.22.00"

[[field_map]]
parser_field = "svs[].sv_id"
quantity = "gps_sv_prn"
sources = [
    { kind = "at", value = "AT!GPSSATINFO?" },
    { kind = "nmea", value = "$GPGSV satellite-number field (1st of each 4-tuple)" },
]

[[field_map]]
parser_field = "svs[].cno_db"
quantity = "gnss_carrier_to_noise_dbhz"
sources = [
    { kind = "at", value = "AT!GPSSATINFO?" },
    { kind = "nmea", value = "$GPGSV SNR field (4th of each 4-tuple, dB-Hz)" },
]

[[field_map]]
parser_field = "svs[].az_deg"
quantity = "gnss_sv_azimuth_deg"
sources = [
    { kind = "at", value = "AT!GPSSATINFO?" },
    { kind = "nmea", value = "$GPGSV azimuth field (3rd of each 4-tuple, deg)" },
]

[[field_map]]
parser_field = "svs[].el_deg"
quantity = "gnss_sv_elevation_deg"
sources = [
    { kind = "at", value = "AT!GPSSATINFO?" },
    { kind = "nmea", value = "$GPGSV elevation field (2nd of each 4-tuple, deg)" },
]

[[field_map]]
parser_field = "gps_week"
quantity = "gps_week_number"

[[field_map.sources]]
kind = "other"
value = "F3 mc_gnssmeasreport.c 'Gps_MeasBlk Wk' (EM7511 build, future F3 run)"

[[field_map]]
parser_field = "gps_milliseconds"
quantity = "gps_time_of_week_ms"

[[field_map.sources]]
kind = "other"
value = "F3 mc_gnssmeasreport.c 'Gps_MeasBlk Ms' (EM7511 build, future F3 run)"

version = 2
cond = "sky-fix"
modem_make = "Foxconn"
modem_model = "T99W640"
modem_firmware = "FDE2.F0.0.0.1.2.TO.001"

[[field_map]]
parser_field = "sequence_counter"
quantity = "gnss_epoch_sequence_counter"
sources = [
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

[[field_map]]
parser_field = "constellation_mask"
quantity = "gnss_active_constellation_config"
sources = [
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
    { kind = "nmea", value = "$GxGSV talker set (GP/GL/GA/GB/GQ) — constellations in view" },
]

[[field_map]]
parser_field = "num_constellations"
quantity = "gnss_tracked_entity_count_candidate"
sources = [
    { kind = "nmea", value = "count of distinct constellation talkers across $GxGSV sentences" },
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
]

version = 2
cond = "sky-fix"
modem_make = "SIMCom"
modem_model = "SIM8202G-M2"
modem_firmware = "LE13B04SIM8202M44A-M2"

[[field_map]]
parser_field = "sv_slots.sv_id"
quantity = "gnss_sv_prn_id"
sources = [
    { kind = "nmea", value = "$GxGSV per-SV PRN / $GxGSA active PRN list (SIM8202G-M2 NMEA port)" },
    { kind = "at", value = "AT+CGNSSINFO" },
]

[[field_map]]
parser_field = "sv_slots.elevation_deg"
quantity = "gnss_sv_elevation_deg"
sources = [
    { kind = "nmea", value = "$GxGSV elevation field (degrees) per satellite group" },
]

[[field_map]]
parser_field = "sv_slots.azimuth_deg"
quantity = "gnss_sv_azimuth_deg"
sources = [
    { kind = "nmea", value = "$GxGSV azimuth field (degrees true) per satellite group" },
]

[[field_map]]
parser_field = "sv_slots.cn0_db_hz"
quantity = "gnss_sv_cn0_db_hz"
sources = [
    { kind = "nmea", value = "$GxGSV SNR/CNo field (dB-Hz) per satellite group" },
]

[[field_map]]
parser_field = "nmea_sentence"
quantity = "gnss_embedded_nmea_sentence"
sources = [
    { kind = "nmea", value = "the SIM8202G-M2 NMEA-port sentence matching nmea_sentence_type" },
]

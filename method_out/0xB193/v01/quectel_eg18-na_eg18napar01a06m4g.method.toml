version = 1
cond = "connected"
modem_make = "Quectel"
modem_model = "EG18-NA"
modem_firmware = "EG18NAPAR01A06M4G"

[[field_map]]
parser_field = "entries.pci"
quantity = "lte_serving_physical_cell_id"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo" },
]

[[field_map]]
parser_field = "entries.earfcn"
quantity = "lte_serving_earfcn"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "at", value = "AT+QNWINFO" },
]

[[field_map]]
parser_field = "entries.rsrp"
quantity = "lte_serving_rsrp_dbm"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "at", value = "AT+QCSQ" },
]

[[field_map]]
parser_field = "entries.rsrq"
quantity = "lte_serving_rsrq_db"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
]

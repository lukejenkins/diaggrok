version = 1
cond = "idle"
modem_make = "Quectel"
modem_model = "EG25-G"
modem_firmware = "EG25GGBR07A08M2G_A0.301.A0.301"

[[field_map]]
parser_field = "entries.pci"
quantity = "lte_serving_physical_cell_id"
status = "verified"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "qmi", value = "QMI_NAS GetCellLocationInfo" },
    { kind = "mbim", value = "MBIM_CID_BASE_STATIONS_INFO" },
]

[[field_map]]
parser_field = "entries.earfcn"
quantity = "lte_serving_earfcn"
status = "verified"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "qmi", value = "QMI_NAS GetServingSystem" },
    { kind = "mbim", value = "MBIM_CID_REGISTER_STATE" },
]

[[field_map]]
parser_field = "entries.rsrp"
quantity = "lte_serving_rsrp_dbm"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "at", value = "AT+QCSQ" },
    { kind = "qmi", value = "QMI_NAS GetSignalInfo" },
]

[[field_map]]
parser_field = "entries.rsrq"
quantity = "lte_serving_rsrq_db"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "qmi", value = "QMI_NAS GetSignalInfo" },
]

[[field_map]]
parser_field = "num_cells"
quantity = "lte_serving_meas_cell_count"
status = "partial"
sources = [
    { kind = "at", value = "AT+QENG=\"servingcell\"" },
    { kind = "at", value = "AT+QENG=\"neighbourcell\"" },
]

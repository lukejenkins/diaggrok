version = 1
cond = "sky-fix"
modem_make = "Inseego"
modem_model = "M2000B"
modem_firmware = "SDX55MOR-2.54.1.1"

[[field_map]]
parser_field = "active_slot_count"
quantity = "gnss_galileo_e6_tracked_sv_count"
sources = [
    { kind = "nmea", value = "$GAGSV" },
    { kind = "qmi", value = "QMI_LOC GetEngineState" },
]

[[field_map]]
parser_field = "header_marker"
quantity = "gnss_galileo_e6_session_state_word"
sources = [
    { kind = "qmi", value = "QMI_LOC GetGnssEngineState" },
    { kind = "trigger", value = "GNSS cold/warm reset + re-fix cycle" },
]

version = 1
cond = "sky-fix"
modem_make = "SIMCom"
modem_model = "SIM8202G-M2"
modem_firmware = "LE13B04SIM8202M44A-M2"

[[field_map]]
parser_field = "msg_id"
quantity = "cgps_ipc_message_dispatch_id"

[[field_map.sources]]
kind = "trigger"
value = "AT+CGPS=1 to power the GNSS engine, then capture under open sky so the CGPS-IPC bus runs; compare against an engine-off capture"

[[field_map.sources]]
kind = "at"
value = "AT+CGPS?"

[[field_map.sources]]
kind = "nmea"
value = "$GxGSA / $GxGGA standard NMEA — present while the engine tracks and the CGPS-IPC bus runs (emission-liveness correlate; the $PQME ME-engine sentences live inside the 0x1375 payload itself, not the NMEA port)"

[[field_map]]
parser_field = "payload_len"
quantity = "cgps_ipc_envelope_structural_fit"

[[field_map.sources]]
kind = "trigger"
value = "capture 0x1375 on this modem and decode; confirm ~100% of records satisfy marker==0x0101 and payload_len==len−28 (envelope fits this firmware)"
